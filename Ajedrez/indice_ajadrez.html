<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Ajedrez</title>
    <meta name="author" content="José Carlos Reina Castro">
    <style>
 
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }

  
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
        }


        .btn-full {
            grid-column: span 2;
        }

        .nav-link {
            padding: 20px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        .c1 { background-color: #ff7675; }
        .c2 { background-color: #74b9ff; }
        .c3 { background-color: #55efc4; }
        .c4 { background-color: #fab1a0; }
        .c5 { background-color: #a29bfe; }

        .nav-link:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .nav-link:active {
            transform: translateY(2px);
            border-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Tableros de Ajedrez</h2>
        
        <div class="grid-menu">
            <a href="./fluid/layout-fluid.html" class="nav-link c1">Tablero Fixed</a>
            
            <a href="#" class="nav-link c2">Tablero Flex</a>
            
            <a href="./fluid/layout-fluid.html" class="nav-link c3">Tablero Fluid</a>
            
            <a href="#" class="nav-link c4">Tablero Grid</a>
            
            <a href="#" class="nav-link c5 btn-full">Tablero Responsive (Funcional)</a>

            <a href="../../Segundo_Trimestre.html" class="nav-link c5 btn-full">Volver para atrás</a>

        </div>
    </div>

</body>
</html>
