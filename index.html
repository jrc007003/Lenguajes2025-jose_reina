<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indice Servidor</title>
    <meta name="author" content="José Carlos Reina Castro">
    <style>
       
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        header {
            text-align: center;
            padding: 2rem 0;
        }

        .contenedor-indice {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tarjeta {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .tarjeta:hover {
            transform: translateY(-5px);
        }

        .tarjeta img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #ddd;
        }

        .info {
            padding: 15px;
            text-align: center;
        }

        .info h3 {
            margin: 0 0 10px;
            color: #333;
        }

        .fotos {
            display: inline-block;
            padding: 13px 16px;
            background-color: #0078d4;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .fotos:hover {
            background-color: #005a9e;
        }
    </style>
</head>

<body>

    <header>
        <h1>LENGUAJE DE MARCAS</h1>
        <p>Soy José Carlos Reina Castro y este es mi índice de los trimestres</p>
    </header>

    <main class="contenedor-indice">

        <article class="tarjeta">
            <img src="./Fotos/PrimerTrimestre.png" alt="fotos">
            <div class="info">
                <h3>Primer Trimestre </h3>
                <p>Trabajo Individual y la Web de las chuches</p>
                <a href="./Primer_Trimestre.html" class="fotos">Ver Trabajos</a>
            </div>
        </article>

        <article class="tarjeta">
            <img src="./Fotos/SegundoTrimestre.png" alt="Descripción del trabajo 2">
            <div class="info">
                <h3>Segundo Trimestre</h3>
                <p>Esta por ver...</p>
                <a href="./Segundo_Trimestre.html" class="fotos">Ver Trabajos</a>
            </div>
        </article>

        <article class="tarjeta">
            <img src="./Fotos/TercerTrimestre.png" alt="Descripción del trabajo 2">
            <div class="info">
                <h3>Tercer trimestre</h3>
                <p>Esta por ver...</p>
                <a href="./Fotos/TercerTrimestre.png" class="fotos">Ver Trabajos
                </a>
            </div>
        </article>



    </main>

</body>

</html>
